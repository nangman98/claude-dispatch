<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="/manifest.json">
  <title>Claude Dispatch</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen" style="display:none">
    <h2>Claude Dispatch</h2>
    <p>Paste the token from the server terminal.</p>
    <input type="text" id="token-input" placeholder="Token or full URL" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="token-submit">Connect</button>
  </div>

  <!-- Session List Screen -->
  <div id="session-screen" class="screen">
    <header class="screen-header">
      <span id="status-dot"></span>
      <h1>Dispatch</h1>
      <button id="theme-btn">Theme</button>
      <button id="new-session-btn">+ New</button>
    </header>
    <div id="session-list"></div>
    <div id="empty-state">
      <p>No sessions yet.</p>
      <p>Tap <strong>+ New</strong> to start.</p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen" style="display:none">
    <header class="screen-header">
      <button id="back-btn">&larr;</button>
      <div id="chat-header-info">
        <span id="chat-title"></span>
        <span id="chat-subtitle"></span>
      </div>
      <select id="chat-model-select">
        <option value="">Opus</option>
        <option value="sonnet">Sonnet</option>
        <option value="haiku">Haiku</option>
      </select>
      <button id="chat-delete-btn">Del</button>
    </header>
    <div id="tab-bar">
      <button class="tab active" data-tab="chat">Chat</button>
      <button class="tab" data-tab="term">Terminal</button>
    </div>
    <div id="thinking-bar" style="display:none">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span>Claude is thinking...</span>
    </div>
    <main id="chat-area"></main>
    <main id="term-area" style="display:none">
      <div id="term-output"></div>
    </main>
    <div id="image-preview" style="display:none"></div>
    <footer id="chat-footer">
      <div id="cmd-popup" style="display:none"></div>
      <label id="attach-btn" title="Attach image">
        <input type="file" id="file-input" accept="image/*" multiple hidden>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </label>
      <textarea id="prompt-input" rows="1" placeholder="Send a message..." disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </footer>
    <footer id="term-footer" style="display:none">
      <span id="term-prompt">$</span>
      <input type="text" id="term-input" placeholder="command..." autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="term-run">Run</button>
    </footer>
  </div>

  <!-- Theme Modal -->
  <div id="theme-modal" style="display:none">
    <div class="modal-content">
      <h3>Theme</h3>
      <div id="theme-grid"></div>
      <div style="margin-top:8px">
        <label style="font-size:13px;color:var(--text-muted)">Custom background color</label>
        <input type="color" id="custom-bg" value="#0d1117" style="width:100%;height:40px;border:none;border-radius:8px;cursor:pointer">
      </div>
      <div class="modal-actions">
        <button id="theme-close" style="background:var(--accent);color:#fff;border:none;font-weight:600">Done</button>
      </div>
    </div>
  </div>

  <!-- Directory Picker Modal -->
  <div id="dir-modal" style="display:none">
    <div class="modal-content">
      <h3>Select Project Directory</h3>
      <div id="dir-current"></div>
      <div id="dir-list"></div>
      <select id="model-select">
        <option value="">Default (Opus)</option>
        <option value="sonnet">Sonnet (faster)</option>
        <option value="haiku">Haiku (fastest)</option>
      </select>
      <div class="modal-actions">
        <button id="dir-up">.. Parent</button>
        <button id="dir-select">Use This Directory</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div id="rename-modal" style="display:none">
    <div class="modal-content">
      <h3>Rename Session</h3>
      <input type="text" id="rename-input" placeholder="Session name" autocomplete="off">
      <div class="modal-actions">
        <button id="rename-cancel">Cancel</button>
        <button id="rename-confirm">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
